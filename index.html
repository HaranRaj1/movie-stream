<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sf-red': '#E50914',
                        'sf-dark': '#0a0a0f',
                        'sf-surface': '#12121a',
                        'sf-card': '#16161f',
                        'sf-border': '#1e1e2a',
                        'sf-muted': '#6b6b80',
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-inter film-grain bg-sf-dark text-white overflow-x-hidden">
    <div id="toast-container" class="fixed top-24 right-6 z-[200] flex flex-col gap-3"></div>
    
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-[100] transition-all duration-700"></nav>
    <main id="app-viewport" class="relative z-10"></main>
    <footer id="footer"></footer>

    <!-- Master Modal -->
    <div id="modal" class="fixed inset-0 z-[150] hidden">
        <div class="modal-backdrop absolute inset-0 bg-black/75" onclick="window.app.closeModal()"></div>
        <div class="relative z-10 max-w-3xl mx-auto mt-6 sm:mt-10 max-h-[92vh] overflow-y-auto rounded-2xl animate-scale-in shadow-2xl">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="js/state.js" type="module"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
