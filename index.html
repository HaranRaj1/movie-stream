<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix — Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'sf-red':'#E50914','sf-dark':'#0a0a0f','sf-surface':'#12121a','sf-card':'#16161f','sf-border':'#1e1e2a','sf-muted':'#6b6b80' }, fontFamily:{'inter':['Inter','sans-serif']} } } }
    </script>
    <style>
        :root{--c-primary:#E50914;--c-bg:#0a0a0f;--c-surface:#12121a;--c-card:#16161f;--c-border:#1e1e2a;--c-muted:#6b6b80;--c-text:#ffffff;--c-text2:#94a3b8;--f-heading:'Inter',sans-serif;--f-body:'Inter',sans-serif;--f-hw:700;--f-bw:300;--btn-radius:12px;--card-radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--f-body);background:var(--c-bg);color:var(--c-text);overflow-x:hidden;font-weight:var(--f-bw)}
        ::-webkit-scrollbar{height:3px;width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
        .row-scroll{scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}.row-scroll::-webkit-scrollbar{display:none}
        .card-hover{transition:transform 500ms cubic-bezier(0.16,1,0.3,1),box-shadow 500ms ease}.card-hover:hover{transform:scale(1.12) translateY(-8px);z-index:30;box-shadow:0 30px 80px -20px rgba(0,0,0,0.9),0 0 60px -10px rgba(229,9,20,0.12)}
        .card-hover:hover .card-info{opacity:1;transform:translateY(0)}.card-hover:hover .card-overlay{opacity:1}.card-hover:hover .card-img{transform:scale(1.05)}
        .card-info{opacity:0;transform:translateY(12px);transition:all 400ms cubic-bezier(0.16,1,0.3,1) 80ms}.card-overlay{opacity:0;transition:opacity 400ms ease}.card-img{transition:transform 600ms cubic-bezier(0.16,1,0.3,1)}
        .hero-gradient{background:linear-gradient(135deg,rgba(10,10,15,0.97) 0%,rgba(10,10,15,0.8) 30%,rgba(10,10,15,0.3) 55%,transparent 80%),linear-gradient(to top,var(--c-bg) 0%,rgba(10,10,15,0.85) 25%,rgba(10,10,15,0.2) 55%,transparent 75%)}
        .nav-blur{backdrop-filter:blur(24px) saturate(120%);-webkit-backdrop-filter:blur(24px) saturate(120%)}.modal-backdrop{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
        @keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(100%) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(100%) scale(0.9)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes glow-pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
        @keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-2%)}30%{transform:translate(1%,2%)}50%{transform:translate(-1%,1%)}70%{transform:translate(2%,-1%)}90%{transform:translate(-2%,1%)}}
        .animate-slide-up{animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards}.animate-slide-down{animation:slideDown 0.4s cubic-bezier(0.16,1,0.3,1) forwards}.animate-scale-in{animation:scaleIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards}.animate-toast-in{animation:toastIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards}.animate-toast-out{animation:toastOut 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
        .film-grain::after{content:'';position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");animation:grain 6s steps(8) infinite;pointer-events:none;z-index:9999}
        .genre-chip{transition:all 300ms cubic-bezier(0.16,1,0.3,1)}.genre-chip:hover{background:var(--c-primary);color:white;border-color:var(--c-primary);transform:translateY(-2px);box-shadow:0 4px 20px rgba(229,9,20,0.3)}.genre-chip.active{background:var(--c-primary);color:white;border-color:var(--c-primary)}
        .scroll-arrow{transition:all 300ms cubic-bezier(0.16,1,0.3,1);opacity:0;transform:scale(0.8)}.row-container:hover .scroll-arrow{opacity:1;transform:scale(1)}.scroll-arrow:hover{background:rgba(229,9,20,0.95);transform:scale(1.1)!important}
        .top10-number{font-size:9rem;font-weight:900;-webkit-text-stroke:3px rgba(229,9,20,0.25);color:transparent;line-height:0.85;font-style:italic;filter:drop-shadow(0 0 30px rgba(229,9,20,0.1))}
        .search-input:focus{outline:none}.maturity-badge{border:1px solid rgba(255,255,255,0.3);padding:0 5px;font-size:10px;font-weight:600;letter-spacing:0.5px}
        .genre-tile{transition:all 400ms cubic-bezier(0.16,1,0.3,1)}.genre-tile:hover{transform:translateY(-4px) scale(1.02)}.genre-tile:hover .genre-tile-img{transform:scale(1.1)}.genre-tile-img{transition:transform 600ms cubic-bezier(0.16,1,0.3,1)}
        .row-title{position:relative;display:inline-block}.row-title::after{content:'';position:absolute;bottom:-4px;left:0;width:32px;height:3px;background:var(--c-primary);border-radius:2px;transition:width 300ms ease}.row-container:hover .row-title::after{width:100%}
        .avatar-ring{background:conic-gradient(from 0deg,var(--c-primary),#ff6b6b,var(--c-primary));padding:2px;border-radius:10px;cursor:pointer;transition:all 300ms}.avatar-ring:hover{box-shadow:0 0 20px rgba(229,9,20,0.3);transform:scale(1.05)}
        .ai{background:#0a0a0f;border:1px solid #1e1e2a;color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;width:100%;transition:border-color 300ms;font-family:var(--f-body)}.ai:focus{outline:none;border-color:var(--c-primary)}.ai::placeholder{color:#4a4a5a}
        .ab{background:var(--c-primary);color:white;font-weight:600;font-size:13px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;transition:all 300ms;font-family:var(--f-body)}.ab:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 4px 20px rgba(229,9,20,0.3)}
        .ab2{background:#1e1e2a;color:#ccc;font-weight:500;font-size:13px;padding:10px 20px;border-radius:10px;border:1px solid #2a2a3a;cursor:pointer;transition:all 300ms;font-family:var(--f-body)}.ab2:hover{background:#2a2a3a;color:#fff}
        .abd{background:transparent;color:#f87171;font-weight:500;font-size:13px;padding:10px 20px;border-radius:10px;border:1px solid #7f1d1d;cursor:pointer;transition:all 300ms;font-family:var(--f-body)}.abd:hover{background:#7f1d1d;color:#fff}
        .ac{background:#12121a;border:1px solid #1e1e2a;border-radius:16px;padding:20px;transition:border-color 300ms}.ac:hover{border-color:#2a2a3a}
        .at{width:100%;border-collapse:separate;border-spacing:0}.at th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6b6b80;border-bottom:1px solid #1e1e2a}.at td{padding:12px 14px;font-size:13px;border-bottom:1px solid #14141c;vertical-align:middle}.at tr:hover td{background:rgba(255,255,255,0.02)}
        .st{padding:6px 14px;font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 200ms;color:#6b6b80;background:transparent;border:1px solid transparent}
        .st:hover{color:#fff;background:rgba(255,255,255,0.03)}.st.active{color:#fff;background:#1e1e2a;border-color:#2a2a3a}
        .tgl{position:relative;width:40px;height:22px;border-radius:11px;background:#1e1e2a;cursor:pointer;transition:background 300ms;border:none;flex-shrink:0}
        .tgl::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#6b6b80;transition:all 300ms}
        .tgl.on{background:var(--c-primary)}.tgl.on::after{left:21px;background:#fff}
        .clr-swatch{width:36px;height:36px;border-radius:10px;border:2px solid #2a2a3a;cursor:pointer;transition:all 200ms;position:relative;overflow:hidden}.clr-swatch:hover{border-color:#fff;transform:scale(1.1)}.clr-swatch input{position:absolute;inset:-8px;width:calc(100% + 16px);height:calc(100% + 16px);opacity:0;cursor:pointer}
        .section-toggle{transition:all 400ms ease}.section-toggle.off{opacity:0.15;pointer-events:none}
        #announcement-bar{transition:all 400ms ease}#promo-popup{transition:all 400ms ease}
        .ad-slot{transition:all 300ms ease}
        @media(max-width:768px){.top10-number{font-size:5.5rem;-webkit-text-stroke:2px rgba(229,9,20,0.2)}.card-hover:hover{transform:scale(1.04) translateY(-4px)}.card-info{opacity:1;transform:translateY(0)}.card-overlay{opacity:1}}
    </style>
</head>
<body class="film-grain">
<div id="toast-container" class="fixed top-24 right-6 z-[200] flex flex-col gap-3"></div>

<!-- Admin Login -->
<div id="admin-login" class="fixed inset-0 z-[300] hidden">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeAdminLogin()"></div>
    <div class="relative z-10 max-w-md mx-auto mt-[15vh] animate-scale-in"><div class="ac p-8">
        <div class="flex items-center justify-between mb-6"><div><div class="flex items-center gap-2 mb-1"><div class="w-6 h-6 bg-sf-red rounded-lg flex items-center justify-center"><i data-lucide="shield" class="w-3 h-3 text-white"></i></div><span class="text-sm font-bold">Admin Access</span></div><p class="text-xs text-sf-muted">Enter password to continue</p></div><button onclick="closeAdminLogin()" class="text-sf-muted hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <div id="login-error" class="hidden mb-4 p-3 rounded-xl bg-red-950/50 border border-red-900/50 text-red-400 text-xs"></div>
        <input id="admin-pass" type="password" placeholder="Password" class="ai mb-4" onkeydown="if(event.key==='Enter')attemptAdminLogin()">
        <button onclick="attemptAdminLogin()" class="ab w-full">Authenticate</button>
    </div></div>
</div>

<!-- Admin Panel -->
<div id="admin-panel" class="fixed inset-0 z-[250] hidden">
    <div class="absolute inset-0 bg-[#0a0a0f]/98 backdrop-blur-xl"></div>
    <div class="relative z-10 h-full flex flex-col">
        <header class="flex items-center justify-between px-6 py-4 border-b border-white/5 flex-shrink-0">
            <div class="flex items-center gap-3"><div class="w-8 h-8 bg-sf-red rounded-lg flex items-center justify-center"><i data-lucide="shield" class="w-4 h-4 text-white"></i></div><div><h1 class="text-base font-bold">Admin Panel</h1><p class="text-[11px] text-sf-muted">Full site editor</p></div></div>
            <div class="flex items-center gap-2"><button onclick="saveAll()" class="ab text-xs py-2 px-4 flex items-center gap-2"><i data-lucide="save" class="w-3.5 h-3.5"></i> Save</button><button onclick="closeAdmin()" class="ab2 text-xs py-2 px-4 flex items-center gap-2"><i data-lucide="eye" class="w-3.5 h-3.5"></i> Preview</button><button onclick="resetAllData()" class="abd text-xs py-2 px-4 flex items-center gap-2"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset</button><button onclick="closeAdmin()" class="abd text-xs py-2 px-4"><i data-lucide="x" class="w-3.5 h-3.5"></i></button></div>
        </header>
        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <div class="w-56 border-r border-white/5 flex-shrink-0 overflow-y-auto p-3 space-y-1 hidden lg:block">
                <div class="text-[10px] font-bold uppercase tracking-wider text-sf-muted px-3 pt-2 pb-1">Content</div>
                <button onclick="switchAdminTab('movies')" class="st active w-full text-left flex items-center gap-2" data-tab="movies"><i data-lucide="film" class="w-3.5 h-3.5"></i> Movies</button>
                <button onclick="switchAdminTab('rows')" class="st w-full text-left flex items-center gap-2" data-tab="rows"><i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> Content Rows</button>
                <button onclick="switchAdminTab('hero')" class="st w-full text-left flex items-center gap-2" data-tab="hero"><i data-lucide="image" class="w-3.5 h-3.5"></i> Hero Slider</button>
                <button onclick="switchAdminTab('top10')" class="st w-full text-left flex items-center gap-2" data-tab="top10"><i data-lucide="trophy" class="w-3.5 h-3.5"></i> Top 10</button>
                <button onclick="switchAdminTab('genres')" class="st w-full text-left flex items-center gap-2" data-tab="genres"><i data-lucide="grid-3x3" class="w-3.5 h-3.5"></i> Genre Tiles</button>
                <div class="text-[10px] font-bold uppercase tracking-wider text-sf-muted px-3 pt-4 pb-1">Appearance</div>
                <button onclick="switchAdminTab('branding')" class="st w-full text-left flex items-center gap-2" data-tab="branding"><i data-lucide="palette" class="w-3.5 h-3.5"></i> Branding</button>
                <button onclick="switchAdminTab('colors')" class="st w-full text-left flex items-center gap-2" data-tab="colors"><i data-lucide="pipette" class="w-3.5 h-3.5"></i> Colors & Theme</button>
                <button onclick="switchAdminTab('typography')" class="st w-full text-left flex items-center gap-2" data-tab="typography"><i data-lucide="type" class="w-3.5 h-3.5"></i> Typography</button>
                <button onclick="switchAdminTab('components')" class="st w-full text-left flex items-center gap-2" data-tab="components"><i data-lucide="component" class="w-3.5 h-3.5"></i> Components</button>
                <button onclick="switchAdminTab('header')" class="st w-full text-left flex items-center gap-2" data-tab="header"><i data-lucide="panel-top" class="w-3.5 h-3.5"></i> Header Builder</button>
                <button onclick="switchAdminTab('footer')" class="st w-full text-left flex items-center gap-2" data-tab="footer"><i data-lucide="panel-bottom" class="w-3.5 h-3.5"></i> Footer Builder</button>
                <button onclick="switchAdminTab('banners')" class="st w-full text-left flex items-center gap-2" data-tab="banners"><i data-lucide="megaphone" class="w-3.5 h-3.5"></i> Banners & Popups</button>
                <button onclick="switchAdminTab('sections')" class="st w-full text-left flex items-center gap-2" data-tab="sections"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Sections</button>
                <div class="text-[10px] font-bold uppercase tracking-wider text-sf-muted px-3 pt-4 pb-1">Monetization</div>
                <button onclick="switchAdminTab('adplacements')" class="st w-full text-left flex items-center gap-2" data-tab="adplacements"><i data-lucide="layout-list" class="w-3.5 h-3.5"></i> Ad Placements</button>
                <button onclick="switchAdminTab('campaigns')" class="st w-full text-left flex items-center gap-2" data-tab="campaigns"><i data-lucide="target" class="w-3.5 h-3.5"></i> Campaigns</button>
                <button onclick="switchAdminTab('sponsored')" class="st w-full text-left flex items-center gap-2" data-tab="sponsored"><i data-lucide="badge-dollar-sign" class="w-3.5 h-3.5"></i> Sponsored & Affiliate</button>
            </div>
            <!-- Mobile tabs -->
            <div class="lg:hidden flex-shrink-0 border-b border-white/5 overflow-x-auto row-scroll p-2 gap-1" id="mobile-admin-tabs"></div>
            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6" id="admin-content"></div>
        </div>
    </div>
</div>

<!-- Movie Editor -->
<div id="movie-editor" class="fixed inset-0 z-[260] hidden"><div class="absolute inset-0 bg-black/80" onclick="closeMovieEditor()"></div><div class="relative z-10 max-w-2xl mx-auto mt-[8vh] max-h-[84vh] overflow-y-auto animate-scale-in"><div class="ac p-6 sm:p-8"><div class="flex items-center justify-between mb-6"><h2 id="editor-title" class="text-lg font-bold">Add Movie</h2><button onclick="closeMovieEditor()" class="text-sf-muted hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="space-y-4"><div><label class="text-xs text-sf-muted block mb-1.5">Title</label><input id="ed-title" class="ai" placeholder="Movie title"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-sf-muted block mb-1.5">Genre</label><select id="ed-genre" class="ai"><option value="action">Action</option><option value="thriller">Thriller</option><option value="scifi">Sci-Fi</option><option value="drama">Drama</option><option value="comedy">Comedy</option><option value="horror">Horror</option><option value="romance">Romance</option><option value="documentary">Documentary</option></select></div><div><label class="text-xs text-sf-muted block mb-1.5">Year</label><input id="ed-year" type="number" class="ai" placeholder="2024"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-sf-muted block mb-1.5">Duration</label><input id="ed-duration" class="ai" placeholder="2h 15m"></div><div><label class="text-xs text-sf-muted block mb-1.5">Maturity</label><select id="ed-maturity" class="ai"><option value="TV-G">TV-G</option><option value="PG">PG</option><option value="PG-13">PG-13</option><option value="TV-14">TV-14</option><option value="TV-MA">TV-MA</option><option value="R">R</option></select></div></div><div><label class="text-xs text-sf-muted block mb-1.5">Description</label><textarea id="ed-desc" rows="3" class="ai resize-none" placeholder="Movie description..."></textarea></div><div><label class="text-xs text-sf-muted block mb-1.5">Cast</label><input id="ed-cast" class="ai" placeholder="Actor 1, Actor 2"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-sf-muted block mb-1.5">Image Seed</label><input id="ed-img" class="ai" placeholder="my-poster"><p class="text-[10px] text-sf-muted mt-1">Poster & card image</p></div><div><label class="text-xs text-sf-muted block mb-1.5">Banner Seed</label><input id="ed-banner" class="ai" placeholder="my-banner"><p class="text-[10px] text-sf-muted mt-1">Hero & modal background</p></div></div><div class="flex items-center gap-3 pt-2"><button onclick="saveMovieEdits()" class="ab flex-1">Save Movie</button><button onclick="closeMovieEditor()" class="ab2">Cancel</button></div></div></div></div></div>

<!-- Announcement Bar -->
<div id="announcement-bar" class="hidden"></div>

<!-- Promo Popup -->
<div id="promo-popup" class="fixed inset-0 z-[180] hidden">
    <div class="absolute inset-0 bg-black/70" onclick="closePromoPopup()"></div>
    <div class="relative z-10 max-w-lg mx-auto mt-[20vh] animate-scale-in" id="promo-popup-content"></div>
</div>

<!-- Nav -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-[100] transition-all duration-700">
    <div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-12">
        <div class="flex items-center justify-between h-16 lg:h-20">
            <div class="flex items-center gap-6 lg:gap-10">
                <a href="#" id="logo-link" class="flex items-center gap-2.5 group"><div id="logo-icon" class="w-9 h-9 bg-sf-red rounded-xl flex items-center justify-center shadow-lg shadow-sf-red/20 group-hover:shadow-sf-red/40 transition-shadow duration-500"><i data-lucide="play" class="w-4 h-4 text-white fill-white ml-0.5"></i></div><span id="logo-text" class="text-xl font-bold tracking-tight">Stream<span style="color:var(--c-primary)">Flix</span></span></a>
                <div id="nav-menu" class="hidden lg:flex items-center gap-0.5"></div>
                <button id="mobile-menu-btn" class="lg:hidden p-2 text-sf-muted hover:text-white transition-colors"><i data-lucide="menu" class="w-5 h-5"></i></button>
            </div>
            <div class="flex items-center gap-3">
                <div id="search-wrapper" class="relative flex items-center">
                    <div id="search-closed" class="cursor-pointer p-2 text-sf-muted hover:text-white transition-colors duration-300" onclick="openSearch()"><i data-lucide="search" class="w-[18px] h-[18px]"></i></div>
                    <div id="search-open" class="hidden items-center animate-slide-down"><i data-lucide="search" class="w-4 h-4 text-sf-muted absolute left-3"></i><input id="search-input" type="text" placeholder="Titles, people, genres..." class="search-input bg-sf-surface/95 border border-white/10 text-sm text-white pl-10 pr-10 py-2.5 w-60 lg:w-96 rounded-xl placeholder:text-sf-muted focus:border-sf-red/40 transition-all duration-300 shadow-xl" oninput="handleSearch(this.value)"><button onclick="closeSearch()" class="absolute right-3 text-sf-muted hover:text-white transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button></div>
                </div>
                <div id="nav-profile" class="avatar-ring" onclick="openAdminLogin()"><div class="w-8 h-8 rounded-[8px] overflow-hidden bg-sf-surface"><img src="https://picsum.photos/seed/avatar-user/80/80.jpg" alt="Profile" class="w-full h-full object-cover"></div></div>
            </div>
        </div>
    </div>

function renderRowsEditor(c){c.innerHTML='<p class="text-sm text-sf-muted mb-4">Edit row titles and movie assignments</p><div class="space-y-4">'+SD.rows.map(function(r,ri){return '<div class="ac"><div class="flex items-center justify-between mb-3"><input value="'+esc(r.title)+'" onchange="SD.rows['+ri+'].title=this.value" class="ai max-w-xs" placeholder="Row title"><button onclick="SD.rows.splice('+ri+',1);saveSiteData();switchAdminTab(\'rows\')" class="abd text-[11px] py-1 px-3">Remove</button></div><div class="flex flex-wrap gap-1.5">'+r.ids.map(function(mid,mi){var m=getMovie(mid);return '<span class="inline-flex items-center gap-1.5 text-xs px-2.5 py-1.5 rounded-lg bg-white/5 border border-white/5">'+(m?esc(m.title):'#'+mid)+'<button onclick="SD.rows['+ri+'].ids.splice('+mi+',1);saveSiteData();switchAdminTab(\'rows\')" class="text-sf-muted hover:text-red-400">&times;</button></span>'}).join('')+'</div><div class="mt-3 pt-3 border-t border-white/5"><select id="row-add-'+ri+'" class="ai text-xs py-1.5"><option value="">Add movie...</option>'+SD.movies.map(function(m){return '<option value="'+m.id+'">'+esc(m.title)+'</option>'}).join('')+'</select><button onclick="var s=document.getElementById(\'row-add-'+ri+'\');if(s.value){SD.rows['+ri+'].ids.push(parseInt(s.value));saveSiteData();switchAdminTab(\'rows\')}" class="ab text-[11px] py-1.5 px-3 mt-1">Add</button></div></div>'}).join('')+'<button onclick="SD.rows.push({title:\'New Row\',ids:[]});saveSiteData();switchAdminTab(\'rows\')" class="ab2 text-xs py-2 px-4 flex items-center gap-2 mt-2"><i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Row</button></div>'}
function renderHeroSelector(c){c.innerHTML='<p class="text-sm text-sf-muted mb-4">Select hero banner movies (max 6)</p><div class="ac"><div id="hero-selector" class="flex flex-wrap gap-2">'+SD.movies.map(function(m){var sel=SD.heroIds.indexOf(m.id)!==-1;return '<button onclick="toggleHeroMovie('+m.id+')" class="text-xs px-3 py-2 rounded-lg border transition-all '+(sel?'bg-sf-red/20 border-sf-red/40 text-white':'bg-white/3 border-white/5 text-sf-muted hover:border-white/20')+'">'+esc(m.title)+'</button>'}).join('')+'</div></div>'}

function renderGenresEditor(c){c.innerHTML='<p class="text-sm text-sf-muted mb-4">Edit genre display names</p><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">'+SD.genres.map(function(g,i){return '<div class="ac flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center flex-shrink-0"><i data-lucide="'+g.icon+'" class="w-4 h-4 text-sf-muted"></i></div><input value="'+esc(g.name)+'" onchange="SD.genres['+i+'].name=this.value" class="ai text-sm"></div>'}).join('')+'</div>'}

nclick="SD.monetization.sponsored.items.push({id:Date.now(),title:\'New\',desc:\'Description\',imageUrl:\'\',link:\'\',enabled:true});saveSiteData();switchAdminTab(\'sponsored\')" class="ab2 text-xs py-2 px-4 flex items-center gap-2 mt-3"><i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Item</button></div><div class="ac"><div class="flex items-center justify-between mb-4"><h3 class="text-sm font-semibold">Affiliate Section</h3><button class="tgl '+(af.enabled?'on':'')+'" onclick="SD.monetization.affiliate.enabled=toggleEl(this);saveSiteData()"></button></div><input value="'+esc(af.title)+'" onchange="SD.monetization.affiliate.title=this.value;saveSiteData()" class="ai mb-3" placeholder="Section title"><p class="text-xs text-sf-muted mb-3">Affiliate cards with icons linking to partner offers.</p>'+af.items.map(function(it,i){return '<div class="p-3 rounded-xl border border-white/5 bg-white/[0.02] mb-2"><div class="flex items-center justify-between mb-2"><span class="text-xs font-medium">Affiliate '+(i+1)+'</span><div class="flex gap-1"><button onclick="SD.monetization.affiliate.items['+i+'].enabled=!SD.monetization.affiliate.items['+i+'].enabled;saveSiteData();switchAdminTab(\'sponsored\')" class="ab2 text-[10px] py-0.5 px-2">'+(it.enabled?'On':'Off')+'</button><button onclick="SD.monetization.affiliate.items.splice('+i+',1);saveSiteData();switchAdminTab(\'sponsored\')" class="text-sf-muted hover:text-red-400 text-[10px]">&times;</button></div></div><input value="'+esc(it.title)+'" onchange="SD.monetization.affiliate.items['+i+'].title=this.value;saveSiteData()" class="ai text-xs py-1.5 mb-1.5" placeholder="Title"><input value="'+esc(it.desc)+'" onchange="SD.monetization.affiliate.items['+i+'].desc=this.value;saveSiteData()" class="ai text-xs py-1.5 mb-1.5" placeholder="Short description"><input value="'+esc(it.icon||'')+'" onchange="SD.monetization.affiliate.items['+i+'].icon=this.value;saveSiteData()" class="ai text-xs py-1.5 mb-1.5" placeholder="Lucide icon name // Movie CRUD
function openMovieEditor(id){editingMovieId=id;document.getElementById('movie-editor').classList.remove('hidden');if(id===-1){document.getElementById('editor-title').textContent='Add Movie';['ed-title','ed-duration','ed-desc','ed-cast','ed-img','ed-banner'].forEach(function(x){document.getElementById(x).value=''});document.getElementById('ed-genre').value='action';document.getElementById('ed-year').value='2024';document.getElementById('ed-maturity').value='R'}else{var m=getMovie(id);if(!m)return;document.getElementById('editor-title').textContent='Edit Movie';document.getElementById('ed-title').value=m.title;document.getElementById('ed-genre').value=m.genre;document.getElementById('ed-year').value=m.year;document.getElementById('ed-duration').value=m.duration;document.getElementById('ed-maturity').value=m.maturity;document.getElementById('ed-desc').value=m.desc;document.getElementById('ed-cast').value=m.cast;document.getElementById('ed-img').value=m.img;document.getElementById('ed-banner').value=m.banner}}
function closeMovieEditor(){document.getElementById('movie-editor').classList.add('hidden')}
function saveMovieEdits(){var t=document.getElementById('ed-title').value.trim();if(!t){showToast('Title required');return}var obj={title:t,genre:document.getElementById('ed-genre').value,year:parseInt(document.getElementById('ed-year').value)||2024,duration:document.getElementById('ed-duration').value.trim(),maturity:document.getElementById('ed-maturity').value,desc:document.getElementById('ed-desc').value.trim(),cast:document.getElementById('ed-cast').value.trim(),img:document.getElementById('ed-img').value.trim()||'default-movie',banner:document.getElementById('ed-banner').value.trim()||'default-movie'};if(editingMovieId===-1){obj.id=SD.movies.length>0?Math.max.apply(null,SD.movies.map(function(m){return m.id}))+1:0;SD.movies.push(obj);showToast('Movie added')}else{var m=getMovie(editingMovieId);if(m)Object.assign(m,obj);showToast('Movie updated')}saveSiteData();closeMovieEditor();switchAdminTab('movies')}
function deleteMovie(id){SD.movies=SD.movies.filter(function(m){return m.id!==id});SD.rows.forEach(function(r){r.ids=r.ids.filter(function(i){return i!==id})});SD.heroIds=SD.heroIds.filter(function(i){return i!==id});SD.top10Ids=SD.top10Ids.filter(function(i){return i!==id});saveSiteData();switchAdminTab('movies');showToast('Deleted')}

function saveAll(){saveSiteData();showToast('All changes saved!');renderAll();setTimeout(closeAdmin,600)}

document.addEventListener('DOMContentLoaded',function(){loadSiteData();renderAll();switchAdminTab('movies')});
</script>
